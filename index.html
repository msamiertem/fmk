<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMK İHO Öğrenci Kabul Sınavı Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .print-only { display: none; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- App Container -->
    <div id="app" class="max-w-4xl mx-auto pb-24">
        <!-- Loader -->
        <div id="loader" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
            <div class="flex flex-col items-center">
                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-emerald-600 mb-4"></div>
                <p class="text-emerald-700 font-medium">Sistem Yükleniyor...</p>
            </div>
        </div>

        <!-- Global Message -->
        <div id="toast" class="fixed top-4 right-4 z-[110] transform translate-x-full transition-transform duration-300 pointer-events-none">
            <div id="toast-content" class="bg-white border-l-4 p-4 shadow-2xl rounded-lg flex items-center gap-3 min-w-[300px]">
                <div id="toast-icon"></div>
                <div id="toast-text" class="font-medium text-sm"></div>
            </div>
        </div>

        <!-- Dynamic Content Area -->
        <main id="main-content" class="p-4"></main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md border border-slate-200 px-6 py-3 rounded-full shadow-2xl flex items-center gap-8 z-50 no-print">
            <button onclick="router.navigate('landing')" class="nav-link flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600 transition-colors" data-view="landing">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Ana Sayfa</span>
            </button>
            <button onclick="router.navigate('parent-login')" class="nav-link flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600 transition-colors" data-view="parent-login">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Veli</span>
            </button>
            <button onclick="router.navigate('admin-login')" class="nav-link flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600 transition-colors" data-view="admin-login">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Admin</span>
            </button>
        </nav>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, addDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CONFIG & INIT
        let firebaseConfig;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "AIzaSyCEDQx24MxmojexLe1446bWuCc4BQY9MAY",
                authDomain: "fmkiho.firebaseapp.com",
                projectId: "fmkiho",
                storageBucket: "fmkiho.firebasestorage.app",
                messagingSenderId: "71872908192",
                appId: "1:71872908192:web:d3f25f0af1b367d29e72c5",
                measurementId: "G-NCSR8MJ5LC"
            };
        } catch (e) {
            console.error("Firebase config parse hatası", e);
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fmkiho';
        
        let app, db, auth;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
        } catch (e) {
            console.error("Firebase başlatılamadı. Lütfen config bilgilerini kontrol edin.", e);
        }

        // STATE
        let state = {
            user: null,
            settings: null,
            applicants: [],
            rooms: [],
            currentView: 'landing',
            adminAuth: false,
            parentTc: '',
            applicantData: null
        };

        const FIELD_MASTER_LIST = [
            { id: 'ad', label: 'Öğrenci Adı', group: 'ogrenci' },
            { id: 'soyad', label: 'Öğrenci Soyadı', group: 'ogrenci' },
            { id: 'dogumYeri', label: 'Doğum Yeri', group: 'ogrenci' },
            { id: 'dogumTarihi', label: 'Doğum Tarihi', group: 'ogrenci' },
            { id: 'seviye', label: 'Seviye (Sınıf)', group: 'ogrenci', type: 'select', options: ['4. Sınıf', '5. Sınıf'] },
            { id: 'cinsiyet', label: 'Cinsiyet', group: 'ogrenci', type: 'select', options: ['Kız', 'Erkek'] },
            { id: 'ilkokul', label: 'Okuduğu İlkokul', group: 'ogrenci' },
            { id: 'adres', label: 'Adres', group: 'iletisim', type: 'textarea' },
            { id: 'il', label: 'Adres İli', group: 'iletisim' },
            { id: 'ilce', label: 'Adres İlçesi', group: 'iletisim' },
            { id: 'basarilar', label: 'Başarı ve Yetenekler', group: 'ogrenci', type: 'textarea' },
            { id: 'bolum1', label: 'Bölüm Tercihi 1', group: 'tercih', type: 'select', options: ['Hafızlık', 'Arapça', 'İngilizce'] },
            { id: 'babaAd', label: 'Baba Adı Soyadı', group: 'veli' },
            { id: 'babaCep', label: 'Baba Cep Telefonu', group: 'veli', placeholder: '5XX XX XX' },
            { id: 'babaMeslek', label: 'Baba Mesleği', group: 'veli' },
            { id: 'babaEgitim', label: 'Baba Eğitim Durumu', group: 'veli', type: 'select', options: ['İlkokul', 'Ortaokul', 'Lise', 'MYO', 'Üniversite', 'Yüksek Lisans', 'Doktora'] },
            { id: 'anneAd', label: 'Anne Adı Soyadı', group: 'veli' },
            { id: 'anneCep', label: 'Anne Cep Telefonu', group: 'veli', placeholder: '5XX XX XX' },
            { id: 'veliKim', label: 'Öğrenci Velisi Kimdir?', group: 'veli', type: 'select', options: ['Anne', 'Baba', 'Diğer'] },
            { id: 'kuranSeviye', label: 'Kuran Bilgi Düzeyi', group: 'ogrenci', type: 'select', options: ['Hiç Bilmiyor', 'Başlangıç', 'Orta', 'İleri', 'Hafızlık Yapıyor'] },
            { id: 'ingSeviye', label: 'İngilizce Bilgi Düzeyi', group: 'ogrenci', type: 'select', options: ['Çok Zayıf', 'Normal', 'İleri', 'Üst Seviye'] },
            { id: 'referans', label: 'Bizi Nereden Duydunuz?', group: 'diger', type: 'select', options: ['Yakın Tavsiyesi', 'Biliyordum', 'Okulda Çocuğum Var', 'Sosyal Medya'] },
            { id: 'not', label: 'Okula Notunuz', group: 'diger', type: 'textarea' },
            { id: 'oncelikTercih', label: 'Öncelikli Bölüm Tercihiniz?', group: 'tercih', type: 'select', options: ['Öncelik Hafızlık', 'Öncelik İngilizce'] },
            { id: 'tercihSebebi', label: 'Okulu Tercih Sebebi?', group: 'diger', type: 'select', options: ['Akademik', 'Hafızlık', 'Tavsiye', 'Diğer'] }
        ];

        // UTILITIES
        const showToast = (text, type = 'success') => {
            const toast = document.getElementById('toast');
            const toastContent = document.getElementById('toast-content');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');

            toastText.innerText = text;
            toastContent.className = `bg-white border-l-4 p-4 shadow-2xl rounded-lg flex items-center gap-3 min-w-[300px] ${type === 'error' ? 'border-red-500' : 'border-emerald-500'}`;
            toastIcon.innerHTML = type === 'error' ? '<i data-lucide="alert-triangle" class="text-red-500"></i>' : '<i data-lucide="check-circle" class="text-emerald-500"></i>';
            lucide.createIcons();
            
            toast.classList.remove('translate-x-full');
            setTimeout(() => toast.classList.add('translate-x-full'), 3000);
        };

        // VIEW RENDERING
        const router = {
            navigate: (view) => {
                state.currentView = view;
                render();
                window.scrollTo(0, 0);
            }
        };

        const render = () => {
            const main = document.getElementById('main-content');
            document.querySelectorAll('.nav-link').forEach(el => {
                const isActive = el.getAttribute('data-view') === state.currentView || (state.currentView.startsWith('admin') && el.getAttribute('data-view') === 'admin-login');
                el.classList.toggle('text-emerald-600', isActive);
                el.classList.toggle('text-slate-400', !isActive);
            });

            switch (state.currentView) {
                case 'landing': main.innerHTML = views.landing(); break;
                case 'parent-login': main.innerHTML = views.parentLogin(); break;
                case 'parent-form': main.innerHTML = views.parentForm(); break;
                case 'parent-status': main.innerHTML = views.parentStatus(); break;
                case 'admin-login': main.innerHTML = views.adminLogin(); break;
                case 'admin-dashboard': main.innerHTML = views.adminDashboard(); break;
                case 'admin-fields': main.innerHTML = views.adminFields(); break;
                case 'admin-rooms': main.innerHTML = views.adminRooms(); break;
            }
            lucide.createIcons();
        };

        const views = {
            header: () => `
                <div class="bg-emerald-700 text-white p-8 rounded-b-[40px] shadow-lg mb-8 text-center relative overflow-hidden no-print">
                    <div class="relative z-10 flex flex-col items-center">
                        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mb-4 shadow-xl rotate-3">
                            <i data-lucide="graduation-cap" class="text-emerald-700 w-12 h-12"></i>
                        </div>
                        <h1 class="text-2xl font-black uppercase tracking-tighter">Fatma ve Mehmet Karaca</h1>
                        <h2 class="text-lg font-medium opacity-80 uppercase tracking-widest text-emerald-100">İmam Hatip Ortaokulu</h2>
                        <div class="mt-4 bg-emerald-600/50 backdrop-blur-sm px-4 py-1.5 rounded-full text-xs font-bold border border-emerald-500/30">ÖĞRENCİ KABUL SINAVI SİSTEMİ</div>
                    </div>
                </div>
            `,

            landing: () => `
                ${views.header()}
                <div class="grid md:grid-cols-2 gap-6 animate-in slide-in-from-bottom-4 duration-500">
                    <div onclick="router.navigate('parent-login')" class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 hover:shadow-xl hover:border-emerald-200 transition-all cursor-pointer group">
                        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                            <i data-lucide="clipboard-list" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-xl font-black mb-2 text-slate-800">Veli Girişi</h3>
                        <p class="text-slate-500 text-sm leading-relaxed">Yeni sınav başvurusu yapmak veya durum sorgulamak için burayı kullanın.</p>
                        <div class="mt-6 flex items-center text-blue-600 font-bold text-sm gap-2">
                            Giriş Yap <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </div>
                    </div>
                    <div onclick="router.navigate('admin-login')" class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 hover:shadow-xl hover:border-purple-200 transition-all cursor-pointer group">
                        <div class="w-16 h-16 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                            <i data-lucide="shield-check" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-xl font-black mb-2 text-slate-800">Yönetim Paneli</h3>
                        <p class="text-slate-500 text-sm leading-relaxed">Başvuruları onaylama ve salon atama işlemleri için yetkili girişi.</p>
                        <div class="mt-6 flex items-center text-purple-600 font-bold text-sm gap-2">
                            Sistemi Yönet <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
            `,

            parentLogin: () => `
                ${views.header()}
                <div class="max-w-md mx-auto bg-white p-10 rounded-[40px] shadow-xl border border-slate-100">
                    <div class="text-center mb-8">
                        <h3 class="text-2xl font-black text-slate-800">Sisteme Giriş</h3>
                        <p class="text-slate-400 text-sm">T.C. Kimlik numaranızı yazarak devam edin.</p>
                    </div>
                    <div class="space-y-6">
                        <input type="text" id="login-tc" maxlength="11" placeholder="00000000000" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 text-center text-2xl font-mono tracking-[0.3em] focus:border-emerald-500 focus:bg-white transition-all outline-none">
                        <button onclick="actions.parentLogin()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                            <i data-lucide="log-in" class="w-5 h-5"></i> DEVAM ET
                        </button>
                    </div>
                </div>
            `,

            parentForm: () => {
                const fields = FIELD_MASTER_LIST.filter(f => state.settings.fields[f.id]?.active);
                const groups = { ogrenci: 'Öğrenci Bilgileri', tercih: 'Tercihler', veli: 'Veli Bilgileri', iletisim: 'İletişim', diger: 'Ek Bilgiler' };
                
                return `
                <div class="mb-8 flex items-center justify-between no-print">
                    <button onclick="router.navigate('parent-login')" class="flex items-center gap-2 text-slate-400 font-bold hover:text-slate-800 transition-colors">
                        <i data-lucide="chevron-left"></i> Vazgeç
                    </button>
                    <h2 class="text-xl font-black uppercase text-emerald-800">Başvuru Formu</h2>
                </div>
                <form id="apply-form" class="space-y-8 animate-in fade-in duration-700" onsubmit="actions.saveApplication(event)">
                    ${Object.entries(groups).map(([groupId, groupLabel]) => {
                        const groupFields = fields.filter(f => f.group === groupId);
                        if (groupFields.length === 0) return '';
                        return `
                            <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100">
                                <h4 class="text-sm font-black text-emerald-600 uppercase tracking-widest mb-6 flex items-center gap-2">
                                    <span class="w-2 h-2 bg-emerald-600 rounded-full"></span> ${groupLabel}
                                </h4>
                                <div class="grid md:grid-cols-2 gap-5">
                                    ${groupFields.map(f => {
                                        const config = state.settings.fields[f.id];
                                        const req = config.required ? 'required' : '';
                                        const reqStar = config.required ? '<span class="text-red-500 ml-1">*</span>' : '';
                                        let input = `<input type="text" name="${f.id}" ${req} placeholder="${f.placeholder || ''}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 outline-none focus:border-emerald-500 transition-all">`;
                                        if (f.type === 'textarea') input = `<textarea name="${f.id}" ${req} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 outline-none focus:border-emerald-500 transition-all h-24"></textarea>`;
                                        if (f.type === 'select') input = `<select name="${f.id}" ${req} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 outline-none focus:border-emerald-500 transition-all"><option value="">Seçiniz</option>${f.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
                                        return `<div><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">${f.label} ${reqStar}</label>${input}</div>`;
                                    }).join('')}
                                </div>
                            </div>
                        `;
                    }).join('')}
                    <button type="submit" class="w-full bg-emerald-600 text-white font-black py-5 rounded-[24px] shadow-2xl transition-all">KAYDET VE TAMAMLA</button>
                </form>
                `;
            },

            parentStatus: () => {
                const app = state.applicantData;
                const room = state.rooms.find(r => r.id === app.room);
                return `
                ${views.header()}
                <div class="bg-white rounded-[40px] shadow-2xl border p-10 text-center no-print">
                    <h3 class="text-3xl font-black text-slate-800 mb-4">${app.ad} ${app.soyad}</h3>
                    <div class="inline-block px-6 py-2 rounded-full font-black text-xs uppercase ${app.status === 'approved' ? 'bg-emerald-600 text-white' : 'bg-blue-600 text-white'}">
                        DURUM: ${app.status === 'approved' ? 'ONAYLANDI' : 'İNCELENİYOR'}
                    </div>
                    ${app.status === 'approved' ? `<button onclick="window.print()" class="block mt-12 bg-slate-800 text-white font-black px-10 py-4 rounded-2xl mx-auto">BELGEYİ YAZDIR</button>` : `<p class="mt-8 text-slate-500">Başvurunuz onaylandığında giriş belgeniz burada görünecektir.</p>`}
                </div>
                <div class="print-only p-10 border-4 border-black font-sans">
                    <h1>${state.settings?.schoolName}</h1>
                    <h2>SINAV GİRİŞ BELGESİ</h2>
                    <p><strong>TC:</strong> ${app.tc}</p>
                    <p><strong>Ad Soyad:</strong> ${app.ad} ${app.soyad}</p>
                    <p><strong>Salon:</strong> ${room ? room.name : 'Okulda İlan Edilecektir'}</p>
                </div>
                `;
            },

            adminLogin: () => `
                <div class="max-w-md mx-auto pt-12">
                    <div class="bg-white p-10 rounded-[40px] shadow-2xl border border-slate-100">
                        <h3 class="text-2xl font-black text-center mb-10">ADMİN GİRİŞİ</h3>
                        <input type="password" id="admin-pass" placeholder="Şifre (admin123)" class="w-full bg-slate-50 border rounded-2xl px-6 py-4 mb-6 text-center outline-none">
                        <button onclick="actions.adminLogin()" class="w-full bg-purple-600 text-white font-black py-4 rounded-2xl">GİRİŞ</button>
                    </div>
                </div>
            `,

            adminDashboard: () => `
                <div class="mb-8 flex justify-between items-center">
                    <h2 class="text-2xl font-black">ADAY LİSTESİ</h2>
                    <div class="flex gap-2 bg-white p-1 rounded-2xl border">
                        <button onclick="router.navigate('admin-dashboard')" class="px-4 py-2 rounded-xl text-xs font-black bg-purple-600 text-white">Adaylar</button>
                        <button onclick="router.navigate('admin-fields')" class="px-4 py-2 rounded-xl text-xs font-black text-slate-500">Ayarlar</button>
                        <button onclick="router.navigate('admin-rooms')" class="px-4 py-2 rounded-xl text-xs font-black text-slate-500">Salonlar</button>
                    </div>
                </div>
                <div class="bg-white rounded-[32px] border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                            <tr><th class="px-6 py-4">Öğrenci</th><th class="px-6 py-4">TC</th><th class="px-6 py-4">Salon</th><th class="px-6 py-4">İşlem</th></tr>
                        </thead>
                        <tbody class="divide-y">
                            ${state.applicants.map(app => `
                                <tr>
                                    <td class="px-6 py-4 font-bold">${app.ad} ${app.soyad}</td>
                                    <td class="px-6 py-4 font-mono">${app.tc}</td>
                                    <td class="px-6 py-4">
                                        <select onchange="actions.assignRoom('${app.id}', this.value)" class="text-xs border rounded p-1">
                                            <option value="">Seç</option>
                                            ${state.rooms.map(r => `<option value="${r.id}" ${app.room === r.id ? 'selected' : ''}>${r.name}</option>`).join('')}
                                        </select>
                                    </td>
                                    <td class="px-6 py-4">
                                        <button onclick="actions.toggleAppStatus('${app.id}', '${app.status}')" class="text-[10px] font-black px-3 py-1 rounded-full ${app.status === 'approved' ? 'bg-emerald-600 text-white' : 'bg-slate-200'}">
                                            ${app.status === 'approved' ? 'ONAYLI' : 'ONAYLA'}
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `,

            adminFields: () => `
                <div class="mb-8 flex justify-between items-center">
                    <h2 class="text-2xl font-black">FORM AYARLARI</h2>
                    <button onclick="router.navigate('admin-dashboard')" class="text-sm font-bold text-slate-400">Geri Dön</button>
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    ${FIELD_MASTER_LIST.map(f => {
                        const conf = state.settings?.fields?.[f.id] || { active: false, required: false };
                        return `
                            <div class="p-4 bg-white border rounded-2xl flex items-center justify-between">
                                <span class="text-xs font-black">${f.label}</span>
                                <div class="flex gap-4">
                                    <label class="text-[10px] flex items-center gap-1 font-bold"><input type="checkbox" ${conf.active ? 'checked' : ''} onchange="actions.updateFieldSetting('${f.id}', 'active', this.checked)"> AKTİF</label>
                                    <label class="text-[10px] flex items-center gap-1 font-bold"><input type="checkbox" ${conf.required ? 'checked' : ''} onchange="actions.updateFieldSetting('${f.id}', 'required', this.checked)"> ZORUNLU</label>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `,

            adminRooms: () => `
                <div class="mb-8 flex justify-between items-center">
                    <h2 class="text-2xl font-black">SALONLAR</h2>
                    <button onclick="router.navigate('admin-dashboard')" class="text-sm font-bold text-slate-400">Geri Dön</button>
                </div>
                <div class="bg-white p-6 rounded-[32px] border mb-6">
                    <input type="text" id="new-room-name" placeholder="Yeni Salon Adı" class="border p-2 rounded-xl mr-2">
                    <button onclick="actions.addRoom()" class="bg-purple-600 text-white px-4 py-2 rounded-xl font-bold">EKLE</button>
                </div>
                <div class="space-y-2">
                    ${state.rooms.map(r => `<div class="p-4 bg-white border rounded-2xl flex justify-between"><span>${r.name}</span> <button onclick="actions.deleteRoom('${r.id}')" class="text-red-500 font-bold">Sil</button></div>`).join('')}
                </div>
            `
        };

        const actions = {
            parentLogin: () => {
                const tc = document.getElementById('login-tc').value.trim();
                if (tc.length !== 11) { showToast("11 hane giriniz.", "error"); return; }
                state.parentTc = tc;
                const existing = state.applicants.find(a => a.tc === tc);
                if (existing) { state.applicantData = existing; router.navigate('parent-status'); }
                else router.navigate('parent-form');
            },
            saveApplication: async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                data.tc = state.parentTc; data.status = 'pending'; data.room = '';
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'applicants', state.parentTc), data);
                    state.applicantData = data;
                    showToast("Kaydedildi.");
                    router.navigate('parent-status');
                } catch (err) { showToast("Hata!", "error"); }
            },
            adminLogin: () => {
                if (document.getElementById('admin-pass').value === "admin123") {
                    state.adminAuth = true; router.navigate('admin-dashboard');
                } else showToast("Hatalı!", "error");
            },
            toggleAppStatus: async (id, current) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'applicants', id), { status: current === 'approved' ? 'pending' : 'approved' });
            },
            assignRoom: async (id, room) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'applicants', id), { room });
            },
            addRoom: async () => {
                const name = document.getElementById('new-room-name').value;
                if (name) await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'rooms'), { name });
            },
            deleteRoom: async (id) => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', id));
                showToast("Salon silindi.");
            },
            updateFieldSetting: async (fId, prop, val) => {
                const newFields = { ...state.settings.fields };
                if (!newFields[fId]) newFields[fId] = { active: false, required: false };
                newFields[fId][prop] = val;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { fields: newFields });
            }
        };

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (e) { console.warn("Anonim giriş yapılamadı."); }

            onAuthStateChanged(auth, (u) => {
                state.user = u;
                if (u) {
                    onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), (s) => {
                        if (s.exists()) state.settings = s.data();
                        else {
                            const initial = { schoolName: "Fatma ve Mehmet Karaca İmam Hatip Ortaokulu", fields: {} };
                            FIELD_MASTER_LIST.forEach(f => initial.fields[f.id] = { active: true, required: ['ad', 'soyad', 'dogumTarihi', 'seviye', 'cinsiyet'].includes(f.id) });
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), initial);
                            state.settings = initial;
                        }
                        render();
                    });
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'applicants'), (snap) => {
                        state.applicants = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        render();
                    });
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'rooms'), (snap) => {
                        state.rooms = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        render();
                    });
                    document.getElementById('loader').style.display = 'none';
                }
            });
        });

        window.actions = actions; window.router = router;
    </script>
</body>
</html>
